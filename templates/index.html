Voici le code HTML5 complet pour une landing page e-commerce de montres de luxe, design luxe et responsive, sans markdown.

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Horloger d'Exception | Montres de Luxe</title>
    <meta name="description" content="Découvrez notre collection exclusive de montres de luxe. Artisanat suisse, design intemporel, prestige absolu.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            color: #1a1a1a;
            background-color: #faf8f5;
            line-height: 1.6;
            overflow-x: hidden;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul {
            list-style: none;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== TYPOGRAPHIE LUXE ===== */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            letter-spacing: 0.02em;
            line-height: 1.2;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.75rem;
            color: #a08c7a;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: clamp(2rem, 5vw, 3.2rem);
            color: #1a1a1a;
            margin-bottom: 16px;
        }

        .section-desc {
            font-size: 1rem;
            color: #5a5a5a;
            max-width: 600px;
            margin: 0 auto 48px auto;
            text-align: center;
            font-weight: 300;
        }

        /* ===== BOUTONS ===== */
        .btn-primary {
            display: inline-block;
            background: #1a1a1a;
            color: #faf8f5;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 16px 40px;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.6s;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        .btn-primary:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .btn-outline {
            display: inline-block;
            background: transparent;
            color: #1a1a1a;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 14px 36px;
            border: 1px solid #1a1a1a;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .btn-outline:hover {
            background: #1a1a1a;
            color: #faf8f5;
        }

        /* ===== HEADER / NAV ===== */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            padding: 20px 0;
            transition: background 0.4s ease, padding 0.4s ease;
            background: transparent;
        }

        .header.scrolled {
            background: rgba(250, 248, 245, 0.97);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 0;
            box-shadow: 0 2px 40px rgba(0,0,0,0.05);
        }

        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #1a1a1a;
        }

        .logo span {
            font-weight: 300;
            color: #a08c7a;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        .nav-links a {
            font-size: 0.75rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #1a1a1a;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: #a08c7a;
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: #a08c7a;
        }

        .nav-icon {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-icon svg {
            width: 20px;
            height: 20px;
            stroke: #1a1a1a;
            fill: none;
            stroke-width: 1.5;
            cursor: pointer;
            transition: stroke 0.3s;
        }

        .nav-icon svg:hover {
            stroke: #a08c7a;
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }

        .menu-toggle span {
            display: block;
            width: 28px;
            height: 1.5px;
            background: #1a1a1a;
            transition: all 0.3s;
        }

        /* ===== HERO ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            position: relative;
            background: #faf8f5;
            padding-top: 100px;
            overflow: hidden;
        }

        .hero .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            align-items: center;
            width: 100%;
        }

        .hero-content {
            padding-right: 20px;
        }

        .hero-content .subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: #a08c7a;
            margin-bottom: 16px;
        }

        .hero-content h1 {
            font-size: clamp(2.8rem, 6vw, 4.5rem);
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.1;
            margin-bottom: 24px;
        }

        .hero-content h1 em {
            font-style: italic;
            font-weight: 300;
            color: #a08c7a;
        }

        .hero-content p {
            font-size: 1.05rem;
            color: #5a5a5a;
            margin-bottom: 40px;
            max-width: 480px;
            font-weight: 300;
            line-height: 1.8;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .hero-image {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-image img {
            width: 100%;
            max-width: 600px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 20px 60px rgba(0,0,0,0.08));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .hero-badge {
            position: absolute;
            bottom: 10%;
            right: 5%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            padding: 16px 24px;
            border-radius: 4px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.06);
            text-align: center;
        }

        .hero-badge span {
            display: block;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a1a1a;
        }

        .hero-badge small {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #a08c7a;
        }

        /* ===== MARQUES ===== */
        .marques {
            padding: 80px 0;
            background: #ffffff;
            border-top: 1px solid rgba(0,0,0,0.04);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        .marques .container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px 60px;
        }

        .marques img {
            height: 28px;
            opacity: 0.35;
            filter: grayscale(1);
            transition: opacity 0.4s, filter 0.4s;
            cursor: default;
        }

        .marques img:hover {
            opacity: 0.6;
            filter: grayscale(0);
        }

        /* ===== COLLECTION ===== */
        .collection {
            padding: 120px 0;
            background: #faf8f5;
        }

        .collection-header {
            text-align: center;
            margin-bottom: 64px;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
        }

        .product-card {
            background: #ffffff;
            padding: 40px 32px 32px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            border: 1px solid rgba(0,0,0,0.04);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 60px rgba(0,0,0,0.06);
            border-color: rgba(160, 140, 122, 0.2);
        }

        .product-card img {
            width: 100%;
            max-width: 240px;
            height: 260px;
            object-fit: contain;
            margin-bottom: 24px;
            transition: transform 0.6s;
        }

        .product-card:hover img {
            transform: scale(1.03);
        }

        .product-card .badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: #1a1a1a;
            color: #faf8f5;
            font-size: 0.6rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            padding: 6px 14px;
            text-transform: uppercase;
        }

        .product-card h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #1a1a1a;
        }

        .product-card .meta {
            font-size: 0.75rem;
            color: #a08c7a;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 12px;
        }

        .product-card .price {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 20px;
        }

        .product-card .btn-outline {
            padding: 10px 28px;
            font-size: 0.7rem;
        }

        /* ===== SAVOIR-FAIRE ===== */
        .savoir-faire {
            padding: 120px 0;
            background: #1a1a1a;
            color: #faf8f5;
        }

        .savoir-faire .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 80px;
            align-items: center;
        }

        .savoir-faire-image {
            position: relative;
        }

        .savoir-faire-image img {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 2px;
            filter: brightness(0.9);
        }

        .savoir-faire-image::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 2px;
            z-index: -1;
        }

        .savoir-faire-content .subtitle {
            color: #a08c7a;
        }

        .savoir-faire-content h2 {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 24px;
        }

        .savoir-faire-content p {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 32px;
            line-height: 1.8;
        }

        .savoir-faire-content .btn-primary {
            background: #faf8f5;
            color: #1a1a1a;
        }

        .savoir-faire-content .btn-primary:hover {
            background: #ffffff;
        }

        /* ===== TÉMOIGNAGES ===== */
        .testimonials {
            padding: 100px 0;
            background: #ffffff;
        }

        .testimonials .section-desc {
            margin-bottom: 56px;
        }

        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .testimonial-card {
            padding: 40px 32px;
            border: 1px solid rgba(0,0,0,0.04);
            transition: all 0.4s;
        }

        .testimonial-card:hover {
            border-color: rgba(160, 140, 122, 0.2);
            box-shadow: 0 12px 40px rgba(0,0,0,0.04);
        }
